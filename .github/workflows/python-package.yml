# This workflow will install Python dependencies and run tests with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ".[dev]"
        pip install pytest-cov

    - name: Install git-only test dependencies
      run: |
        pip install git+https://github.com/djpasseyjr/surd.git
        pip install pyclustering@git+https://github.com/djpasseyjr/pyclustering

    - name: Test with pytest
      run: |
        pytest --cov --cov-branch --cov-report=xml tests

    - name: Upload results to Codecov
      uses: codecov/codecov-action@v5
      with:
          token: ${{ secrets.CODECOV_TOKEN }}
          
    - name: Install pandoc (required by mkdocs-bibtex)
      run: sudo apt-get update && sudo apt-get install -y pandoc

    - name: Build docs
      run: mkdocs build --strict
